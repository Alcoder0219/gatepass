# ─────────────────────────────────────────────────────────────────────────────
# Cloud Build: backend API  →  Artifact Registry  →  Cloud Run
#
# Works both ways:
#   • Manual:   gcloud builds submit --config cloudbuild.backend.yaml
#   • Trigger:  a Cloud Build Trigger on push to main (see README/commands below)
#
# Secrets are passed as plain environment variables via --update-env-vars (NOT
# Secret Manager). Provide their real values through the Cloud Build Trigger's
# substitution variables (stored in GCP) or via `--substitutions` at submit time.
# Do NOT commit real secret values into this file — it lives in a public repo.
# ─────────────────────────────────────────────────────────────────────────────
substitutions:
  _REGION: asia-south1          # Artifact Registry + Cloud Run region
  _REPOSITORY: gatepass         # Artifact Registry repo name
  _SERVICE: gatepass-api        # Cloud Run service name
  _TAG: latest                  # trigger overrides this with $SHORT_SHA
  _API_PREFIX: /api/v1
  _CLIENT_URL: https://REPLACE-WITH-FRONTEND-URL.run.app  # CORS origin + email deep links
  _MEMORY: 512Mi
  _CPU: "1"
  _MIN_INSTANCES: "0"
  _MAX_INSTANCES: "10"
  _CONCURRENCY: "80"

  # Required app secrets — set these in the Trigger substitutions / --substitutions.
  # Leaving them blank deploys with empty values (the API still starts, but DB and
  # auth requests fail until they are provided).
  _MONGODB_URI: ""
  _JWT_ACCESS_SECRET: ""
  _JWT_REFRESH_SECRET: ""

options:
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true

steps:
  # 1 ─ Build the image (context = ./backend, so backend/.dockerignore applies)
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:latest
      - backend

  # 2 ─ Push both tags to Artifact Registry
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}

  # 3 ─ Deploy to Cloud Run.
  #     Cloud Run injects PORT (8080) — the app listens on process.env.PORT.
  #     All env vars (config + secrets) are passed with a single --update-env-vars.
  #     NOTE: values are comma-separated. The MONGODB_URI here is an SRV string
  #     (no commas). If a value ever contains a comma, switch to gcloud's custom
  #     delimiter form, e.g. --update-env-vars=^@^KEY1=val1@KEY2=val2 (pick a
  #     delimiter that appears in none of the values).
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --port=8080
      - --allow-unauthenticated
      - --cpu=${_CPU}
      - --memory=${_MEMORY}
      - --min-instances=${_MIN_INSTANCES}
      - --max-instances=${_MAX_INSTANCES}
      - --concurrency=${_CONCURRENCY}
      - --update-env-vars=NODE_ENV=production,API_PREFIX=${_API_PREFIX},CLIENT_URL=${_CLIENT_URL},JOBS_ENABLED=true,BCRYPT_SALT_ROUNDS=12,RATE_LIMIT_WINDOW_MINUTES=15,RATE_LIMIT_MAX=300,MONGODB_URI=${_MONGODB_URI},JWT_ACCESS_SECRET=${_JWT_ACCESS_SECRET},JWT_REFRESH_SECRET=${_JWT_REFRESH_SECRET}
      - --quiet

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${_TAG}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:latest

timeout: 1200s
