<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/amson-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <meta
      name="description"
      content="Amsons Group — enterprise gate pass management with approvals, HR review, security scanning and analytics."
    />
    <title>Amsons Group — Gate Pass</title>
    <script>
      // Apply the stored theme before first paint so there is no light-mode flash.
      (() => {
        const stored = localStorage.getItem('gatepass.theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const dark = stored ? stored === 'dark' : prefersDark;
        document.documentElement.classList.toggle('dark', dark);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
